<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melodie Xiong</title>

    <!--
      Fonts from Google Fonts. Space Grotesk = an elegant geometric font for
      titles (futuristic but refined, not blocky). Inter = a clean, neutral
      font for body text.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      This single <div> is the "mount point" for the whole React app.
      In Angular you have <app-root></app-root>; here it's <div id="root">.
      src/main.tsx finds this element and renders React into it.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
