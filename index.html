<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Website</title>
  </head>
  <body>
    <!--
      This single <div> is the "mount point" for the whole React app.
      In Angular you have <app-root></app-root>; here it's <div id="root">.
      src/main.tsx finds this element and renders React into it.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
